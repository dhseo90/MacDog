name: Draft Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Required MacDog version label for the generated DMG"
        required: true
      tag:
        description: "Required Git tag to create for the draft release"
        required: true
      acknowledge_unsigned:
        description: "Type UNSIGNED-DRAFT to confirm this is not a notarized public stable release"
        required: true

permissions:
  contents: write

jobs:
  draft:
    name: Build unsigned DMG and create draft release
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check unsigned draft acknowledgement
        env:
          ACKNOWLEDGE_UNSIGNED: ${{ inputs.acknowledge_unsigned }}
        run: |
          if [[ "$ACKNOWLEDGE_UNSIGNED" != "UNSIGNED-DRAFT" ]]; then
            echo "Type UNSIGNED-DRAFT to create an unsigned draft release." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode
        run: xcodebuild -version

      - name: Verify
        env:
          MACDOG_RELEASE_VERSION: ${{ inputs.version }}
        run: ./script/check.sh --no-run

      - name: Package DMG
        env:
          MACDOG_RELEASE_VERSION: ${{ inputs.version }}
        run: ./script/package_release.sh --skip-build

      - name: Verify DMG
        run: hdiutil verify "dist/release/MacDog-${{ inputs.version }}.dmg"

      - name: Verify checksum
        working-directory: dist/release
        run: shasum -a 256 -c "MacDog-${{ inputs.version }}.dmg.sha256"

      - name: Verify signed release tag
        env:
          GH_TOKEN: ${{ github.token }}
          MACDOG_TAG: ${{ inputs.tag }}
        run: |
          tag_type="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$MACDOG_TAG" --jq '.object.type')"
          tag_object_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$MACDOG_TAG" --jq '.object.sha')"
          if [[ "$tag_type" != "tag" ]]; then
            echo "Release tag must be a signed annotated tag, got object type: $tag_type" >&2
            exit 1
          fi

          target_type="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object_sha" --jq '.object.type')"
          target_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object_sha" --jq '.object.sha')"
          verified="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object_sha" --jq '.verification.verified')"
          reason="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_object_sha" --jq '.verification.reason')"

          if [[ "$target_type" != "commit" || "$target_sha" != "$GITHUB_SHA" ]]; then
            echo "Release tag must point at this release head. tag=$target_sha head=$GITHUB_SHA type=$target_type" >&2
            exit 1
          fi

          if [[ "$verified" != "true" ]]; then
            echo "Release tag must be GitHub Verified. reason=$reason" >&2
            exit 1
          fi

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          MACDOG_VERSION: ${{ inputs.version }}
          MACDOG_TAG: ${{ inputs.tag }}
        run: |
          args=(
            release create "$MACDOG_TAG"
            "dist/release/MacDog-$MACDOG_VERSION.dmg"
            "dist/release/MacDog-$MACDOG_VERSION.dmg.sha256"
            --draft
            --verify-tag
            --title "MacDog $MACDOG_VERSION"
            --notes-file "dist/release/MacDog-$MACDOG_VERSION-release-notes.md"
          )

          gh "${args[@]}"

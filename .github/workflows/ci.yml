name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-gates:
    name: static-gates
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode
        run: xcodebuild -version

      - name: Verify
        env:
          MACDOG_APP_VERSION: 9.9.9
        run: ./script/check.sh --no-run
